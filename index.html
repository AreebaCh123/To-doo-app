<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To Do App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark px-4">

<span class="navbar-brand fw-bold">My ToDo App</span>

<div class="ms-auto">

<button class="btn btn-outline-light me-2" id="nav-add">Add Task</button>

<button class="btn btn-outline-light" id="nav-all">All Tasks</button>

</div>

</nav>



<div class="container my-5">

<!-- ADD TASK -->

<div id="add-task-section" style="display:none">

<h3>Add Task</h3>

<form id="task-form">

<div class="mb-3">
<label>Task Name</label>
<input type="text" id="task-name" class="form-control" required>
</div>

<div class="mb-3">
<label>Description</label>
<textarea id="task-desc" class="form-control" required></textarea>
</div>

<div class="mb-3">
<label>Time Needed</label>
<input type="time" id="task-time" class="form-control" required>
</div>

<button class="btn btn-primary">Add Task</button>

</form>

</div>



<!-- ALL TASKS -->

<div id="all-tasks-section" style="display:none">

<h3 class="mb-3">All Tasks</h3>

<div class="mb-3">

<button class="btn btn-outline-primary me-2" id="filter-all">All</button>

<button class="btn btn-outline-success me-2" id="filter-completed">Completed</button>

<button class="btn btn-outline-warning" id="filter-pending">Pending</button>

</div>

<table class="table table-striped">

<thead>

<tr>

<th>Name</th>
<th>Description</th>
<th>Time</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="task-list"></tbody>

</table>

</div>



<!-- EDIT TASK -->

<div id="edit-section" style="display:none">

<div class="card shadow">

<div class="card-body">

<h4>Edit Task</h4>

<form id="edit-form">

<input type="hidden" id="edit-id">

<div class="mb-3">
<label>Task Name</label>
<input type="text" id="edit-name" class="form-control">
</div>

<div class="mb-3">
<label>Description</label>
<textarea id="edit-desc" class="form-control"></textarea>
</div>

<div class="mb-3">
<label>Time Needed</label>
<input type="time" id="edit-time" class="form-control">
</div>

<button class="btn btn-success">Save Changes</button>

</form>

</div>

</div>

</div>

</div>



<!-- TOAST -->

<div class="position-fixed bottom-0 end-0 p-3">

<div id="liveToast" class="toast bg-dark text-white">

<div class="d-flex">

<div class="toast-body" id="toast-body"></div>

<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>

</div>

</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="script.js"></script>

</body>
</html>
